name: CI

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # -----------------------------------------------------------------------
  # Cross-compile matrix: verify the binary builds cleanly on all platforms
  # Does NOT run tests (those require raw-socket privileges not available
  # in standard GHA runners).
  # -----------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux amd64 — with static libpcap
          - os: linux
            goarch: amd64
            runner: ubuntu-22.04
            setup: |
              sudo apt-get update -q
              sudo apt-get install -y libpcap-dev libdbus-1-dev libsystemd-dev gcc
            cgo_ldflags: "-Wl,-static -L/usr/lib/x86_64-linux-gnu/libpcap.a -lpcap -Wl,-Bdynamic -ldbus-1 -lsystemd"

          # Linux arm64 cross-compile (CGO disabled — no arm64 libpcap on amd64 runner)
          - os: linux
            goarch: arm64
            runner: ubuntu-22.04
            setup: ""
            cgo_enabled: "0"

          # macOS amd64
          - os: darwin
            goarch: amd64
            runner: macos-13
            setup: brew install libpcap

          # macOS arm64
          - os: darwin
            goarch: arm64
            runner: macos-14
            setup: brew install libpcap

          # Windows amd64 (cross-compiled on Linux; npcap not required for build)
          - os: windows
            goarch: amd64
            runner: ubuntu-22.04
            goos: windows
            setup: ""
            cgo_enabled: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install system dependencies
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Download Go modules
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos || matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled || '1' }}
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags || '' }}
        run: |
          go build -v ./cmd/ksubdomain/

  # -----------------------------------------------------------------------
  # Lint: vet + staticcheck (no raw-socket dependency)
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install system dependencies
        run: sudo apt-get update -q && sudo apt-get install -y libpcap-dev gcc

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1"
          install-go: false
